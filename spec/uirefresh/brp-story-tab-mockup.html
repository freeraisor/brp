<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>BRP Character Sheet — Story Tab Mockup</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base: #1a1210;
  --bg-card: #241a18;
  --bg-elevated: #2d211f;
  --bg-hover: #3a2a26;
  --border: #4a1f1f;
  --border-soft: #33211f;
  --red: #c8302e;
  --red-bright: #e24b4a;
  --red-muted: #8a2a28;
  --mint: #9ad8c4;
  --mint-dim: #6fa894;
  --blue: #5b8fd8;
  --blue-dim: #3d6a9c;
  --amber: #d4a04a;
  --amber-dim: #8c6a2e;
  --green: #7fb355;
  --green-dim: #4a7030;
  --purple: #a77bc4;
  --pink: #d47ba8;
  --text: #e8e2dc;
  --text-dim: #a89d94;
  --text-muted: #6e6560;
  --font-display: 'Cinzel', Georgia, serif;
  --font-body: 'Inter', system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body { background: var(--bg-base); color: var(--text); font-family: var(--font-body); font-size: 13px; line-height: 1.4; padding: 20px; min-height: 100vh; }

.sheet { max-width: 1280px; margin: 0 auto; background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; display: flex; min-height: 820px; overflow: hidden; }

.sidebar { width: 260px; background: var(--bg-base); border-right: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; }
.workspace { flex: 1; min-width: 0; padding: 20px 24px; overflow-y: auto; max-height: calc(100vh - 40px); }
.rail { width: 52px; background: var(--bg-base); border-left: 1px solid var(--border); padding: 8px 0; display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }

.avatar { aspect-ratio: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 2px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); }
.identity { text-align: center; }
.identity .name { font-family: var(--font-display); font-size: 18px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--red-bright); }
.identity .sub { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; margin-top: 2px; }
.mov-line { display: flex; justify-content: center; gap: 10px; font-size: 10px; letter-spacing: 1px; color: var(--text-muted); text-transform: uppercase; padding: 4px 0; border-top: 1px solid var(--border-soft); border-bottom: 1px solid var(--border-soft); }
.mov-line .mov-val { color: var(--mint); font-weight: 600; }
.status-row { display: flex; justify-content: space-between; gap: 4px; padding: 8px 4px; border-bottom: 1px solid var(--border-soft); }
.status-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 3px; color: var(--text-muted); }
.status-icon.active { color: var(--red-bright); background: rgba(226, 75, 74, 0.12); }

.resource { display: flex; flex-direction: column; gap: 6px; }
.resource-head { display: flex; justify-content: space-between; align-items: baseline; }
.resource-head .label { font-family: var(--font-display); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--red); font-weight: 600; }
.resource-head .value { font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; }
.bar { height: 8px; background: var(--bg-card); border-radius: 1px; overflow: hidden; border: 1px solid var(--border-soft); }
.bar.big { height: 12px; }
.bar-fill { height: 100%; transition: width 0.3s; }
.resource.compact .resource-head .label { font-size: 10px; letter-spacing: 1.5px; color: var(--text-dim); }
.resource.compact .resource-head .value { font-size: 11px; color: var(--text-dim); }
.resource.compact .bar { height: 4px; }
.divider { height: 1px; background: var(--border-soft); margin: 4px 0; }

.rail-btn { width: 52px; height: 48px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; position: relative; border-left: 3px solid transparent; transition: all 0.15s; }
.rail-btn:hover { color: var(--text-dim); background: var(--bg-card); }
.rail-btn.active { color: var(--mint); background: var(--bg-card); border-left-color: var(--mint); }
.rail-btn .tooltip { position: absolute; right: calc(100% + 8px); top: 50%; transform: translateY(-50%); background: var(--bg-elevated); border: 1px solid var(--border); padding: 4px 10px; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text); white-space: nowrap; border-radius: 2px; opacity: 0; pointer-events: none; transition: opacity 0.15s; z-index: 10; }
.rail-btn:hover .tooltip { opacity: 1; }

.tab-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--mint); padding-bottom: 12px; margin-bottom: 16px; border-bottom: 1px solid var(--border-soft); display: flex; align-items: center; gap: 12px; }
.tab-title .lock { margin-left: auto; font-size: 10px; letter-spacing: 2px; color: var(--text-muted); font-family: var(--font-body); font-weight: 400; display: flex; align-items: center; gap: 6px; }

.tab-title .timeline-btn {
  background: var(--bg-base);
  border: 1px solid var(--mint-dim);
  color: var(--mint);
  padding: 5px 12px;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  border-radius: 2px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
}
.tab-title .timeline-btn:hover { background: rgba(154, 216, 196, 0.08); }
.tab-title .timeline-btn svg { width: 12px; height: 12px; }

.section { margin-bottom: 20px; }

.section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; padding-top: 4px; cursor: pointer; user-select: none; }
.section-header .chevron { width: 12px; height: 12px; color: var(--text-muted); transition: transform 0.15s; }
.section.collapsed .chevron { transform: rotate(-90deg); }
.section.collapsed .section-body { display: none; }
.section-header .title { font-family: var(--font-display); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--red); font-weight: 600; }
.section-header .count { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); background: var(--bg-card); padding: 1px 8px; border-radius: 10px; border: 1px solid var(--border-soft); }
.section-header .line { flex: 1; height: 1px; background: var(--border-soft); }
.section-header .actions { display: flex; gap: 6px; }

.icon-btn { width: 28px; height: 28px; background: var(--bg-card); border: 1px solid var(--border-soft); color: var(--text-dim); border-radius: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.icon-btn:hover { border-color: var(--red-muted); color: var(--red-bright); }
.icon-btn svg { width: 14px; height: 14px; }
.icon-btn.small { width: 22px; height: 22px; }
.icon-btn.small svg { width: 11px; height: 11px; }

.section-body { display: flex; flex-direction: column; gap: 6px; }

/* ============ ACTIVE QUESTS ============ */

.quest-card {
  background: var(--bg-base);
  border: 1px solid var(--border-soft);
  border-left: 2px solid var(--amber);
  border-radius: 2px;
  padding: 12px 14px;
  transition: border-color 0.15s;
  cursor: pointer;
}

.quest-card:hover { border-color: var(--border); border-left-color: var(--amber); }
.quest-card.completed { border-left-color: var(--green); opacity: 0.75; }
.quest-card.failed { border-left-color: var(--red-bright); opacity: 0.65; }
.quest-card.abandoned { border-left-color: var(--text-muted); opacity: 0.5; }

.quest-head {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 6px;
}

.quest-name {
  font-family: var(--font-display);
  font-size: 13px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text);
  font-weight: 600;
  flex: 1;
}

.quest-status-badge {
  font-size: 9px;
  letter-spacing: 1px;
  padding: 1px 7px;
  border-radius: 8px;
  font-weight: 600;
  text-transform: uppercase;
  border: 1px solid;
}

.quest-status-badge.active { color: var(--amber); border-color: var(--amber-dim); background: rgba(212,160,74,0.08); }
.quest-status-badge.completed { color: var(--green); border-color: var(--green-dim); background: rgba(127,179,85,0.1); }
.quest-status-badge.failed { color: var(--red-bright); border-color: var(--red-muted); background: rgba(226,75,74,0.1); }
.quest-status-badge.abandoned { color: var(--text-muted); border-color: var(--border-soft); background: var(--bg-card); }

.quest-actions { display: flex; gap: 4px; }

.quest-objective {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 8px;
  line-height: 1.5;
  font-style: italic;
}

.quest-meta {
  display: flex;
  gap: 14px;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.quest-meta .qm-key { color: var(--text-muted); font-weight: 600; }
.quest-meta .qm-val { color: var(--text-dim); }

.quest-updates {
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px solid var(--border-soft);
  font-size: 11px;
}

.quest-updates .qu-label { font-family: var(--font-display); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }

.qu-entry {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 10px;
  padding: 3px 0;
  color: var(--text-dim);
}

.qu-entry .qu-date { color: var(--text-muted); font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase; }

/* ============ JOURNAL FILTERS ============ */

.journal-toolbar {
  background: var(--bg-base);
  border: 1px solid var(--border-soft);
  border-radius: 2px;
  padding: 8px 12px;
  margin-bottom: 12px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.type-chip {
  background: var(--bg-card);
  border: 1px solid var(--border-soft);
  color: var(--text-dim);
  padding: 4px 10px;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-radius: 12px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 500;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.type-chip:hover { border-color: var(--mint-dim); color: var(--mint); }
.type-chip.active { background: rgba(154, 216, 196, 0.08); border-color: var(--mint); color: var(--mint); }

.type-chip .tc-icon { display: flex; }
.type-chip .tc-icon svg { width: 11px; height: 11px; }
.type-chip .tc-count { background: var(--bg-base); color: var(--text-muted); padding: 0 5px; border-radius: 8px; font-size: 9px; margin-left: 4px; }

.journal-search {
  flex: 1;
  position: relative;
  min-width: 140px;
}

.journal-search input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border-soft);
  color: var(--text);
  padding: 5px 10px 5px 28px;
  border-radius: 2px;
  font-family: inherit;
  font-size: 11px;
  outline: none;
}

.journal-search input:focus { border-color: var(--mint-dim); }
.journal-search input::placeholder { color: var(--text-muted); }
.journal-search .js-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 13px; height: 13px; pointer-events: none; }

/* ============ JOURNAL FEED ============ */

.journal-feed { display: flex; flex-direction: column; gap: 6px; }

.journal-entry {
  background: var(--bg-base);
  border: 1px solid var(--border-soft);
  border-radius: 2px;
  padding: 10px 14px;
  transition: border-color 0.15s;
  position: relative;
}

.journal-entry:hover { border-color: var(--border); }
.journal-entry.pinned { border-left: 2px solid var(--amber); }

.je-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}

.je-type-icon {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-card);
  border: 1px solid var(--border-soft);
  border-radius: 2px;
  color: var(--text-dim);
  flex-shrink: 0;
}

.journal-entry[data-type="session-log"] .je-type-icon { color: var(--blue); }
.journal-entry[data-type="quest"] .je-type-icon { color: var(--amber); }
.journal-entry[data-type="npc-encounter"] .je-type-icon { color: var(--pink); }
.journal-entry[data-type="discovery"] .je-type-icon { color: var(--mint); }
.journal-entry[data-type="decision"] .je-type-icon { color: var(--red-bright); }
.journal-entry[data-type="milestone"] .je-type-icon { color: var(--purple); }
.journal-entry[data-type="note"] .je-type-icon { color: var(--text-dim); }

.je-type-icon svg { width: 15px; height: 15px; }

.je-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
  display: flex;
  align-items: center;
  gap: 6px;
}

.je-title .je-pin { color: var(--amber); font-size: 11px; }

.je-type-label {
  font-size: 9px;
  letter-spacing: 1px;
  padding: 1px 6px;
  border-radius: 8px;
  text-transform: uppercase;
  font-weight: 500;
  border: 1px solid var(--border-soft);
  background: var(--bg-card);
  color: var(--text-dim);
}

.je-date {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  text-align: right;
  margin-right: 4px;
  font-variant-numeric: tabular-nums;
}

.je-date .je-session { color: var(--mint); font-weight: 500; margin-right: 4px; }
.je-date .je-ingame { color: var(--text-dim); }

.je-actions { display: flex; gap: 4px; }

.je-content {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.6;
  padding-left: 36px;
  white-space: pre-wrap;
}

.je-links {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding-left: 36px;
  margin-top: 8px;
}

.je-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  background: var(--bg-card);
  border: 1px solid var(--border-soft);
  padding: 2px 8px;
  border-radius: 10px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
}

.je-link:hover { border-color: var(--mint-dim); color: var(--mint); }
.je-link svg { width: 9px; height: 9px; }
.je-link.contact { color: var(--pink); border-color: rgba(212, 123, 168, 0.4); }
.je-link.faction { color: var(--blue); border-color: var(--blue-dim); }
.je-link.quest { color: var(--amber); border-color: var(--amber-dim); }
.je-link.item { color: var(--mint); border-color: var(--mint-dim); }

/* ============ TIMELINE MODAL ============ */

.timeline-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  display: none;
  z-index: 200;
  padding: 40px;
}

.timeline-overlay.show { display: flex; flex-direction: column; }

.timeline-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}

.timeline-header .title {
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--mint);
  font-weight: 700;
}

.timeline-header .view-switcher {
  display: flex;
  gap: 2px;
  background: var(--bg-base);
  border: 1px solid var(--border-soft);
  border-radius: 2px;
  padding: 2px;
}

.view-switcher .vs-btn {
  background: transparent;
  border: 0;
  color: var(--text-muted);
  padding: 6px 14px;
  font-family: inherit;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  font-weight: 500;
  border-radius: 1px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.view-switcher .vs-btn.active { background: var(--red-muted); color: var(--text); }
.view-switcher .vs-btn svg { width: 12px; height: 12px; }

.timeline-header .close-btn {
  margin-left: auto;
  background: var(--bg-base);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 12px;
  border-radius: 2px;
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
}

.timeline-header .close-btn:hover { border-color: var(--red-muted); }
.timeline-header .close-btn svg { width: 12px; height: 12px; }

.timeline-body {
  flex: 1;
  overflow: auto;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 20px;
}

.timeline-body::-webkit-scrollbar { height: 10px; width: 10px; }
.timeline-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.timeline-body::-webkit-scrollbar-thumb:hover { background: var(--red-muted); }

/* ============ TIMELINE — HORIZONTAL SESSIONS ============ */

.timeline-horizontal {
  display: flex;
  gap: 20px;
  padding: 20px 0;
  min-height: 500px;
  position: relative;
}

.timeline-horizontal::before {
  content: '';
  position: absolute;
  top: 60px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--border);
}

.tl-session {
  min-width: 240px;
  max-width: 280px;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.tl-session-header {
  position: relative;
  padding-bottom: 30px;
  text-align: center;
}

.tl-session-dot {
  position: absolute;
  left: 50%;
  top: 52px;
  transform: translate(-50%, -50%);
  width: 14px;
  height: 14px;
  background: var(--mint);
  border: 2px solid var(--bg-card);
  border-radius: 50%;
  z-index: 2;
}

.tl-session-label {
  font-family: var(--font-display);
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--mint);
  font-weight: 600;
}

.tl-session-date {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  margin-top: 2px;
}

.tl-session-entries {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.tl-entry {
  background: var(--bg-base);
  border: 1px solid var(--border-soft);
  border-radius: 2px;
  padding: 8px 10px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}

.tl-entry:hover { border-color: var(--border); transform: translateY(-1px); }

.tl-entry-head {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}

.tl-entry-icon { display: flex; flex-shrink: 0; }
.tl-entry-icon svg { width: 12px; height: 12px; }

.tl-entry[data-type="session-log"] .tl-entry-icon { color: var(--blue); }
.tl-entry[data-type="quest"] .tl-entry-icon { color: var(--amber); }
.tl-entry[data-type="npc-encounter"] .tl-entry-icon { color: var(--pink); }
.tl-entry[data-type="discovery"] .tl-entry-icon { color: var(--mint); }
.tl-entry[data-type="decision"] .tl-entry-icon { color: var(--red-bright); }
.tl-entry[data-type="milestone"] .tl-entry-icon { color: var(--purple); }
.tl-entry[data-type="note"] .tl-entry-icon { color: var(--text-dim); }

.tl-entry-title { font-size: 12px; font-weight: 500; color: var(--text); flex: 1; }
.tl-entry-content { font-size: 10px; color: var(--text-muted); line-height: 1.4; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

/* ============ TIMELINE — PARALLEL LANES ============ */

.timeline-lanes {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 500px;
}

.tl-lane {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 16px;
  padding: 8px 0;
  border-top: 1px solid var(--border-soft);
  align-items: center;
  min-height: 64px;
}

.tl-lane:first-child { border-top: 0; }

.tl-lane-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 600;
}

.tl-lane[data-lane-type="session-log"] .tl-lane-label { color: var(--blue); }
.tl-lane[data-lane-type="quest"] .tl-lane-label { color: var(--amber); }
.tl-lane[data-lane-type="npc-encounter"] .tl-lane-label { color: var(--pink); }
.tl-lane[data-lane-type="discovery"] .tl-lane-label { color: var(--mint); }
.tl-lane[data-lane-type="decision"] .tl-lane-label { color: var(--red-bright); }
.tl-lane[data-lane-type="milestone"] .tl-lane-label { color: var(--purple); }
.tl-lane[data-lane-type="note"] .tl-lane-label { color: var(--text-dim); }

.tl-lane-label svg { width: 14px; height: 14px; }
.tl-lane-count {
  background: var(--bg-base);
  border: 1px solid var(--border-soft);
  padding: 1px 6px;
  border-radius: 8px;
  font-size: 9px;
  color: var(--text-muted);
  font-family: var(--font-body);
  font-weight: 500;
  letter-spacing: 0.5px;
  margin-left: auto;
  text-transform: none;
}

.tl-lane-track {
  position: relative;
  height: 40px;
  background: var(--bg-base);
  border: 1px solid var(--border-soft);
  border-radius: 2px;
}

.tl-lane-session-marker {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 1px;
  background: var(--border);
  opacity: 0.5;
}

.tl-lane-session-marker::after {
  content: attr(data-label);
  position: absolute;
  top: -14px;
  left: 4px;
  font-size: 8px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  white-space: nowrap;
  text-transform: uppercase;
}

.tl-lane-event {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: currentColor;
  border: 2px solid var(--bg-card);
  cursor: pointer;
  transition: all 0.15s;
}

.tl-lane-event:hover { transform: translate(-50%, -50%) scale(1.3); box-shadow: 0 0 0 4px currentColor; opacity: 0.7; }

.tl-lane-event-tooltip {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  padding: 6px 10px;
  border-radius: 2px;
  font-size: 11px;
  color: var(--text);
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
  z-index: 5;
}

.tl-lane-event:hover .tl-lane-event-tooltip { opacity: 1; }

/* ============ MODAL ============ */

.modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.75); display: none; align-items: center; justify-content: center; z-index: 100; }
.modal-overlay.show { display: flex; }
.modal { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 3px; padding: 20px 22px; width: 500px; max-height: 85vh; overflow-y: auto; }
.modal h3 { font-family: var(--font-display); font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: var(--red-bright); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border-soft); }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 10px; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
.field input, .field textarea, .field select { width: 100%; background: var(--bg-base); border: 1px solid var(--border-soft); color: var(--text); padding: 7px 10px; font-family: inherit; font-size: 12px; border-radius: 2px; outline: none; }
.field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--mint-dim); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-buttons { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border-soft); }
.modal-buttons button { background: var(--bg-base); border: 1px solid var(--border-soft); color: var(--text); padding: 8px 18px; font-family: inherit; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; border-radius: 2px; cursor: pointer; font-weight: 500; transition: all 0.15s; }
.modal-buttons button:hover { border-color: var(--red-muted); }
.modal-buttons button.primary { background: var(--mint); color: var(--bg-base); border-color: var(--mint); font-weight: 600; }

.ctx { position: fixed; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 2px; min-width: 180px; padding: 4px; z-index: 120; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6); display: none; }
.ctx.show { display: block; }
.ctx-item { padding: 7px 12px; font-size: 12px; color: var(--text); cursor: pointer; border-radius: 1px; display: flex; align-items: center; gap: 10px; letter-spacing: 0.3px; }
.ctx-item svg { width: 13px; height: 13px; color: var(--text-muted); }
.ctx-item:hover { background: var(--red-muted); }
.ctx-item:hover svg { color: var(--text); }
.ctx-item.danger { color: var(--red-bright); }
.ctx-divider { height: 1px; background: var(--border-soft); margin: 4px 0; }

.chat-log { position: fixed; bottom: 20px; right: 20px; max-width: 380px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 3px; padding: 12px 14px; font-size: 12px; color: var(--text-dim); box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6); opacity: 0; transform: translateY(10px); transition: all 0.25s; pointer-events: none; z-index: 150; }
.chat-log.show { opacity: 1; transform: translateY(0); }
.chat-log .chat-head { font-family: var(--font-display); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--mint); margin-bottom: 4px; }

.workspace::-webkit-scrollbar { width: 6px; }
.workspace::-webkit-scrollbar-track { background: transparent; }
.workspace::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.workspace::-webkit-scrollbar-thumb:hover { background: var(--red-muted); }

.empty-state { background: var(--bg-base); border: 1px dashed var(--border-soft); border-radius: 2px; padding: 20px 14px; text-align: center; font-style: italic; color: var(--text-muted); font-size: 12px; }

        <span class="quest-status-badge ${q.status}">${q.status}</span>
        <div class="quest-actions">
          <button class="icon-btn small" data-qaction="open" data-id="${q.id}" title="Open quest"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M10 14L21 3M21 14v7H3V3h7"/></svg></button>
          <button class="icon-btn small" data-qaction="menu" data-id="${q.id}" title="More"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></button>
        </div>
      </div>
      <div class="quest-objective">${q.objective}</div>
      <div class="quest-meta">
        <span><span class="qm-key">Given:</span> <span class="qm-val">${q.session_given}</span></span>
        ${q.linked.length ? `<span><span class="qm-key">Linked:</span> <span class="qm-val">${q.linked.length} objects</span></span>` : ''}
        <span><span class="qm-key">Updates:</span> <span class="qm-val">${q.updates.length}</span></span>
      </div>
      ${q.updates.length ? `
        <div class="quest-updates">
          <div class="qu-label">Recent updates</div>
          ${q.updates.slice(-2).reverse().map(u => `
            <div class="qu-entry">
              <span class="qu-date">${u.date}</span>
              <span>${u.text}</span>
            </div>
          `).join('')}
        </div>
      ` : ''}
    </div>
  `).join('');

  body.querySelectorAll('.quest-card').forEach(c => {
    c.addEventListener('dblclick', e => {
      if (e.target.closest('.icon-btn')) return;
      const q = quests.find(x => x.id === c.dataset.id);
      showChat(`[SHEET] Open quest: ${q.name}`);
    });
  });

  body.querySelectorAll('[data-qaction="open"]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const q = quests.find(x => x.id === btn.dataset.id);
      showChat(`[SHEET] Open: ${q.name}`);
    });
  });

  body.querySelectorAll('[data-qaction="menu"]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const rect = btn.getBoundingClientRect();
      showQuestCtx(rect.right, rect.bottom, btn.dataset.id);
    });
  });
}

function showQuestCtx(x, y, id) {
  const q = quests.find(x => x.id === id);
  const ctx = document.getElementById('ctx');
  ctx.innerHTML = `
    <div class="ctx-item" data-ctx="open"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M10 14L21 3M21 14v7H3V3h7"/></svg>Open quest</div>
    <div class="ctx-item" data-ctx="add-update"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Add update</div>
    <div class="ctx-divider"></div>
    <div class="ctx-item" data-ctx="complete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>Mark completed</div>
    <div class="ctx-item" data-ctx="fail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>Mark failed</div>
    <div class="ctx-item" data-ctx="abandon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg>Abandon</div>
    <div class="ctx-divider"></div>
    <div class="ctx-item danger" data-ctx="remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>Remove from character</div>
  `;
  ctx.classList.add('show');
  ctx.style.left = Math.min(x, window.innerWidth - 220) + 'px';
  ctx.style.top = Math.min(y, window.innerHeight - 260) + 'px';

  ctx.querySelectorAll('[data-ctx]').forEach(item => {
    item.addEventListener('click', () => {
      const a = item.dataset.ctx;
      if (a === 'open') showChat(`[SHEET] Open: ${q.name}`);
      else if (a === 'add-update') showChat(`[ADD UPDATE] ${q.name}`);
      else if (['complete', 'fail', 'abandon'].includes(a)) {
        q.status = a === 'complete' ? 'completed' : (a === 'fail' ? 'failed' : 'abandoned');
        renderQuests();
        renderJournal();
        showChat(`Quest "${q.name}" marked ${q.status}`);
      } else if (a === 'remove') {
        const idx = quests.indexOf(q);
        quests.splice(idx, 1);
        renderQuests();
        showChat(`Removed quest: ${q.name}`);
      }
      ctx.classList.remove('show');
    });
  });
}

// ============ RENDER JOURNAL ============
function renderJournalToolbar() {
  const toolbar = document.getElementById('journal-toolbar');
  const chips = ENTRY_TYPES.map(t => {
    const count = journalEntries.filter(e => e.type === t.type).length;
    const active = filterState.types.has(t.type);
    return `
      <button class="type-chip ${active ? 'active' : ''}" data-type="${t.type}">
        <span class="tc-icon">${ENTRY_ICONS[t.type]}</span>
        ${t.label}
        <span class="tc-count">${count}</span>
      </button>
    `;
  }).join('');

  toolbar.innerHTML = `
    ${chips}
    <div class="journal-search">
      <svg class="js-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="search" id="journal-search-input" placeholder="Search entries..." value="${filterState.search}">
    </div>
  `;

  toolbar.querySelectorAll('.type-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const t = chip.dataset.type;
      if (filterState.types.has(t)) filterState.types.delete(t);
      else filterState.types.add(t);
      chip.classList.toggle('active');
      renderJournal();
    });
  });

  document.getElementById('journal-search-input').addEventListener('input', e => {
    filterState.search = e.target.value;
    renderJournal();
  });
}

function matchesFilter(entry) {
  if (!filterState.types.has(entry.type)) return false;
  if (filterState.search) {
    const q = filterState.search.toLowerCase();
    if (!entry.title.toLowerCase().includes(q) && !entry.content.toLowerCase().includes(q)) return false;
  }
  return true;
}

function renderJournal() {
  const filtered = journalEntries.filter(matchesFilter);
  const sorted = [...filtered].sort((a, b) => {
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    return (b.real_date || '').localeCompare(a.real_date || '');
  });

  document.getElementById('journal-count').textContent = journalEntries.length;

  const feed = document.getElementById('journal-feed');
  if (sorted.length === 0) {
    feed.innerHTML = `<div class="empty-state">No journal entries match your filters.</div>`;
    return;
  }

  feed.innerHTML = sorted.map(e => {
    const typeLabel = ENTRY_TYPES.find(t => t.type === e.type)?.label.replace(/s$/, '') || e.type;
    return `
      <div class="journal-entry ${e.pinned ? 'pinned' : ''}" data-type="${e.type}" data-id="${e.id}">
        <div class="je-head">
          <div class="je-type-icon">${ENTRY_ICONS[e.type]}</div>
          <div class="je-title">${e.title} ${e.pinned ? '<span class="je-pin">★</span>' : ''}</div>
          <span class="je-type-label">${typeLabel}</span>
          <div class="je-date">
            <span class="je-session">${e.session}</span>
            <span class="je-ingame">${e.in_game_date}</span>
          </div>
          <div class="je-actions">
            <button class="icon-btn small" data-jaction="pin" data-id="${e.id}" title="${e.pinned ? 'Unpin' : 'Pin'}"><svg viewBox="0 0 24 24" fill="${e.pinned ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg></button>
            <button class="icon-btn small" data-jaction="menu" data-id="${e.id}"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></button>
          </div>
        </div>
        <div class="je-content">${e.content}</div>
        ${e.linked.length ? `
          <div class="je-links">
            ${e.linked.map(l => {
              const [kind, id] = l.split(':');
              return `<span class="je-link ${kind}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>${kind}: ${id}</span>`;
            }).join('')}
          </div>
        ` : ''}
      </div>
    `;
  }).join('');

  feed.querySelectorAll('.journal-entry').forEach(el => {
    el.addEventListener('dblclick', e => {
      if (e.target.closest('.icon-btn') || e.target.closest('.je-link')) return;
      const entry = journalEntries.find(x => x.id === el.dataset.id);
      showChat(`[EDIT] Open editor for: ${entry.title}`);
    });
  });

  feed.querySelectorAll('[data-jaction="pin"]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const entry = journalEntries.find(x => x.id === btn.dataset.id);
      entry.pinned = !entry.pinned;
      renderJournal();
    });
  });

  feed.querySelectorAll('[data-jaction="menu"]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const rect = btn.getBoundingClientRect();
      showJournalCtx(rect.right, rect.bottom, btn.dataset.id);
    });
  });

  feed.querySelectorAll('.je-link').forEach(link => {
    link.addEventListener('click', e => {
      e.stopPropagation();
      showChat(`[OPEN] Linked object: ${link.textContent.trim()}`);
    });
  });
}

function showJournalCtx(x, y, id) {
  const entry = journalEntries.find(x => x.id === id);
  const ctx = document.getElementById('ctx');
  ctx.innerHTML = `
    <div class="ctx-item" data-ctx="edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>Edit entry</div>
    <div class="ctx-item" data-ctx="pin"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg>${entry.pinned ? 'Unpin' : 'Pin to top'}</div>
    <div class="ctx-item" data-ctx="duplicate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg>Duplicate</div>
    <div class="ctx-divider"></div>
    <div class="ctx-item danger" data-ctx="delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>Delete</div>
  `;
  ctx.classList.add('show');
  ctx.style.left = Math.min(x, window.innerWidth - 200) + 'px';
  ctx.style.top = Math.min(y, window.innerHeight - 200) + 'px';

  ctx.querySelectorAll('[data-ctx]').forEach(item => {
    item.addEventListener('click', () => {
      const a = item.dataset.ctx;
      if (a === 'edit') showChat(`[EDIT] ${entry.title}`);
      else if (a === 'pin') { entry.pinned = !entry.pinned; renderJournal(); }
      else if (a === 'duplicate') {
        const clone = { ...entry, id: 'j' + Date.now(), title: entry.title + ' (copy)', pinned: false };
        journalEntries.push(clone);
        renderJournal();
      }
      else if (a === 'delete') {
        const idx = journalEntries.indexOf(entry);
        journalEntries.splice(idx, 1);
        renderJournal();
        showChat(`Deleted: ${entry.title}`);
      }
      ctx.classList.remove('show');
    });
  });
}

// ============ TIMELINE ============
function renderTimeline() {
  const body = document.getElementById('timeline-body');
  if (filterState.timelineView === 'horizontal') renderTimelineHorizontal(body);
  else renderTimelineLanes(body);
}

function renderTimelineHorizontal(container) {
  // Group all entries (journal + quests as entries) by session
  const allEvents = [
    ...journalEntries.map(e => ({ session: e.session, type: e.type, title: e.title, content: e.content, date: e.in_game_date })),
    ...quests.flatMap(q => q.updates.map(u => ({ session: u.date, type: 'quest', title: q.name, content: u.text, date: u.date })))
  ];

  const bySession = {};
  allEvents.forEach(e => {
    if (!bySession[e.session]) bySession[e.session] = [];
    bySession[e.session].push(e);
  });

  const sessions = Object.keys(bySession).sort((a, b) => {
    const numA = parseInt(a.match(/\d+/)?.[0] || '0');
    const numB = parseInt(b.match(/\d+/)?.[0] || '0');
    return numA - numB;
  });

  container.innerHTML = `
    <div class="timeline-horizontal">
      ${sessions.map(s => `
        <div class="tl-session">
          <div class="tl-session-header">
            <div class="tl-session-dot"></div>
            <div class="tl-session-label">${s}</div>
            <div class="tl-session-date">${bySession[s][0]?.date || ''}</div>
          </div>
          <div class="tl-session-entries">
            ${bySession[s].map(e => `
              <div class="tl-entry" data-type="${e.type}" title="${e.content.slice(0, 100)}">
                <div class="tl-entry-head">
                  <span class="tl-entry-icon">${ENTRY_ICONS[e.type]}</span>
                  <span class="tl-entry-title">${e.title}</span>
                </div>
                <div class="tl-entry-content">${e.content}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderTimelineLanes(container) {
  // Group events by type (lane) with session markers
  const allEvents = [
    ...journalEntries.map(e => ({ session: e.session, type: e.type, title: e.title, content: e.content })),
    ...quests.flatMap(q => q.updates.map(u => ({ session: u.date, type: 'quest', title: q.name, content: u.text })))
  ];

  // Get all sessions, ordered
  const allSessions = [...new Set(allEvents.map(e => e.session))].sort((a, b) => {
    const numA = parseInt(a.match(/\d+/)?.[0] || '0');
    const numB = parseInt(b.match(/\d+/)?.[0] || '0');
    return numA - numB;
  });

  const sessionPosition = (session) => {
    const idx = allSessions.indexOf(session);
    return (idx + 0.5) / allSessions.length * 100;
  };

  container.innerHTML = `
    <div class="timeline-lanes">
      ${ENTRY_TYPES.map(t => {
        const events = allEvents.filter(e => e.type === t.type);
        return `
          <div class="tl-lane" data-lane-type="${t.type}">
            <div class="tl-lane-label">
              ${ENTRY_ICONS[t.type]}
              ${t.label}
              <span class="tl-lane-count">${events.length}</span>
            </div>
            <div class="tl-lane-track">
              ${allSessions.map((s, i) => `
                <div class="tl-lane-session-marker" style="left: ${i / allSessions.length * 100}%" data-label="${s}"></div>
              `).join('')}
              ${events.map(e => `
                <div class="tl-lane-event" style="left: ${sessionPosition(e.session)}%">
                  <div class="tl-lane-event-tooltip">
                    <strong>${e.title}</strong><br>
                    <small style="color: var(--text-muted)">${e.session}</small>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

// ============ TIMELINE TOGGLE ============
document.getElementById('open-timeline').addEventListener('click', () => {
  document.getElementById('timeline-overlay').classList.add('show');
  renderTimeline();
});

document.getElementById('close-timeline').addEventListener('click', () => {
  document.getElementById('timeline-overlay').classList.remove('show');
});

document.querySelectorAll('.view-switcher .vs-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-switcher .vs-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterState.timelineView = btn.dataset.view;
    renderTimeline();
  });
});

// ============ MISC ============
document.querySelectorAll('.section-header').forEach(h => {
  h.addEventListener('click', e => {
    if (e.target.closest('.icon-btn')) return;
    h.parentElement.classList.toggle('collapsed');
  });
});

document.querySelectorAll('[data-add]').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    showChat(`[ADD] Open creation flow for: ${btn.dataset.add}`);
  });
});

document.addEventListener('click', e => {
  if (!e.target.closest('.ctx')) document.getElementById('ctx').classList.remove('show');
});

document.querySelectorAll('.rail-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.rail-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

let chatTimeout;
function showChat(msg) {
  const log = document.getElementById('chat-log');
  document.getElementById('chat-body').textContent = msg;
  log.classList.add('show');
  clearTimeout(chatTimeout);
  chatTimeout = setTimeout(() => log.classList.remove('show'), 3200);
}

renderQuests();
renderJournalToolbar();
renderJournal();
</script>
</body>
</html>
